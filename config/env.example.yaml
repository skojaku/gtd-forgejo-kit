# User-specific configuration for HQ skills
# Copy this file to env.yaml and fill in your values.
# env.yaml is gitignored — it stays local to your machine.
#
# Public project identifiers (owner/repo/forgejo_url) live in the COMMITTED
# config/project.yaml and override the values here.

user:
  name: Your Name                    # full name, used in email drafts
  username: your-username            # Forgejo login (also "the user" for issue comments)
  timezone: America/New_York         # IANA timezone

repo:
  name: your-username/HQ             # Forgejo owner/repo

calendar:
  zoom_url: ""                       # personal Zoom link (leave empty if none)
  office_location: ""                # default in-person meeting room
  default_duration_min: 60           # default event duration in minutes

working_hours:
  # Working-hour blocks per weekday (local timezone), consumed by `hq cal`.
  # Each block is "HH:MM-HH:MM". Empty list = no working hours.
  monday:    ["09:00-12:00", "13:00-17:00"]
  tuesday:   ["09:00-12:00", "13:00-17:00"]
  wednesday: ["09:00-12:00", "13:00-17:00"]
  thursday:  ["09:00-12:00", "13:00-17:00"]
  friday:    ["09:00-12:00", "13:00-17:00"]
  saturday:  []
  sunday:    []

  # Optional: commute gap — never bookable, splits the day's blocks
  commute:
    start: ""                        # e.g. "14:40"
    end: ""                          # e.g. "15:00"

  # Treat-time policy (enforced by `hq cal free/check/propose`)
  max_bookable_pct: 80              # cap daily bookable time at this %
  min_free_min: 30                  # always leave at least this many minutes free

# Discord issue mirror (scripts/discord-issue-sync.py). Optional — omit to disable.
# Mirrors Forgejo "Next" issues to Discord threads (open on Next, archive on close).
discord:
  guild_id: ""                       # Discord server (guild) ID
  next_channel_id: ""                # parent text channel ID that hosts the threads
  bot_token_env: "~/.hermes/profiles/hq-github/.env"   # file holding DISCORD_BOT_TOKEN

email:
  style_prompt: "scripts/prompts/email-style.md"   # tone reference for drafts

gmail_triage:
  default_account: work
  accounts:
    # config_dir: GOOGLE_WORKSPACE_CLI_CONFIG_DIR for this account. Leave empty
    #   if this host has one gws account at the default location.
    # mail_url_index: the account's position in your browser's Gmail account
    #   switcher (https://mail.google.com/mail/u/<index>/) — used to build
    #   clickable message links in dossiers.
    work:
      config_dir: "~/.config/gws-work"
      mail_url_index: 0
    personal:
      config_dir: "~/.config/gws-personal"
      mail_url_index: 1
  inbox_label: "tasks/inbox"         # Gmail label a human can use to force-route a thread to triage

collect:
  max_entries: 12                    # cap on sources per dossier comment
  excerpt_chars: 400                 # cap on each excerpt
  sources: [gmail, drive, wiki]

queue:
  dir: queue                         # job queue dir (gitignored), relative to repo root
  remote_path: "~/HQ"                # HQ checkout on the entry-point host, for `work --remote`
  runners:
    # Per-job-type LLM config for `hq queue work`. pi_args are passed to pi
    # verbatim; prompt is a template with {{issue}}/{{message_ids}} slots.
    triage:                          # lightweight: classify + file task cards (small model)
      pi_args: ["--provider", "ollama", "--model", "qwen3.5:4b"]
      prompt: scripts/prompts/triage.md
      timeout_min: 10
    collect:                         # heavy: dossier collection (big local model)
      pi_args: []
      prompt: scripts/prompts/collect.md
      warm_url: ""                   # health URL to poll before running (e.g. mtplx /v1/models)
      timeout_min: 20
