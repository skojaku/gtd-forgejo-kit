# Copy this to compose.yaml at your repo root (alongside the Dockerfile) and
# fill in the placeholders below: YOUR_DOMAIN (a Tailscale/WireGuard/private
# hostname — never a public one), YOUR_PRIVATE_IP (that network's IP for this
# host), and YOUR_USER (your Linux username, matching $HOME on the host).
services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__server__DOMAIN=YOUR_DOMAIN
      - FORGEJO__server__ROOT_URL=http://YOUR_DOMAIN:3000/
      - FORGEJO__server__SSH_PORT=222
      - FORGEJO__service__DISABLE_REGISTRATION=true
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__database__DB_TYPE=sqlite3
    restart: always
    volumes:
      - ./forgejo:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      # Bind loopback + your private network only. NEVER 0.0.0.0 — this
      # instance holds all your task/note data.
      - '127.0.0.1:3000:3000'
      - 'YOUR_PRIVATE_IP:3000:3000'
      - '127.0.0.1:222:22'
      - 'YOUR_PRIVATE_IP:222:22'
    networks: [hq]

  hq:
    build: ..                  # repo root, where the Dockerfile lives
    image: hq-container
    container_name: hq
    restart: unless-stopped
    network_mode: host          # reaches forgejo via published host ports
    user: "${UID}:${GID}"       # export UID/GID (or put them in a .env next to this file)
    group_add: ["${DOCKER_GID}"]   # `getent group docker` on the host
    working_dir: /home/YOUR_USER/HQ
    env_file: /home/YOUR_USER/HQ/.env
    environment:
      HOME: /home/YOUR_USER
      TZ: America/New_York        # your timezone — cron-daily/cron-cleanup run on this
      HQ_ROLE: master              # runs the Hermes gateway + dispatch crontab
      GOOGLE_WORKSPACE_CLI_KEYRING_BACKEND: file
      GOOGLE_WORKSPACE_CLI_CONFIG_DIR: /home/YOUR_USER/.config/gws
      PI_OFFLINE: "1"
    volumes:
      - ~/HQ:/home/YOUR_USER/HQ
      - ~/.config/gws:/home/YOUR_USER/.config/gws
      - ~/.config/hq:/home/YOUR_USER/.config/hq:ro
      - ~/.agents:/home/YOUR_USER/.agents:ro
      - ~/.pi:/home/YOUR_USER/.pi
      - ~/.hermes:/home/YOUR_USER/.hermes
      - ~/.email-triage:/home/YOUR_USER/.email-triage
      - /var/run/docker.sock:/var/run/docker.sock

  # Optional: the master machine's own lower-priority collect worker (see
  # ARCHITECTURE.md's worker model). Same image as `hq`, just a different
  # role/crontab — no Hermes gateway (HQ_ROLE=worker), no ~/.hermes mount.
  # Symmetric with a remote worker (scripts/hq-runner.sh over ssh), except
  # this one runs locally on the master's own GPUs, lower priority than any
  # remote worker.
  hq-worker:
    build: ..
    image: hq-container
    container_name: hq-worker
    restart: unless-stopped
    network_mode: host          # reaches the local model endpoint + forgejo
    user: "${UID}:${GID}"
    group_add: ["${DOCKER_GID}"]
    working_dir: /home/YOUR_USER/HQ
    env_file: /home/YOUR_USER/HQ/.env
    command: ["/usr/local/bin/supercronic", "-passthrough-logs", "/home/YOUR_USER/HQ/docker/crontab.worker"]
    environment:
      HOME: /home/YOUR_USER
      TZ: America/New_York
      HQ_ROLE: worker
      GOOGLE_WORKSPACE_CLI_KEYRING_BACKEND: file
      GOOGLE_WORKSPACE_CLI_CONFIG_DIR: /home/YOUR_USER/.config/gws
      PI_OFFLINE: "1"
    volumes:
      - ~/HQ:/home/YOUR_USER/HQ
      - ~/.config/gws:/home/YOUR_USER/.config/gws
      - ~/.config/hq:/home/YOUR_USER/.config/hq:ro
      - ~/.agents:/home/YOUR_USER/.agents:ro
      - ~/.pi:/home/YOUR_USER/.pi
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  hq: {}
